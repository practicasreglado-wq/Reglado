<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      Content Security Policy — hardening F1 (2026-04-27).
      Restringe orígenes para reducir el impacto de un XSS. Si tras un
      cambio de dependencias o endpoints aparece "Refused to load..." en
      consola, añadir aquí el origen legítimo afectado.
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://chatbot.regladogroup.com;
      style-src 'self' 'unsafe-inline';
      font-src 'self' data:;
      img-src 'self' data: blob: https:;
      connect-src 'self' http://localhost:8000 https://regladogroup.com https://chatbot.regladogroup.com;
      media-src 'self' blob:;
      base-uri 'self';
      form-action 'self';
      object-src 'none';
    " />

    <title>Reglado Group | Portal Empresarial</title>
    <meta
      name="description"
      content="Portal corporativo de Reglado Group con acceso a servicios de Energía, Inmuebles, Consultoría y Tecnología."
    />
    <meta name="keywords" content="Reglado Group, Consultoría, Energía, Inmuebles, Tecnología, Inversiones, Innovación" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Reglado Group" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Reglado Group" />
    <meta property="og:url" content="https://regladogroup.com/" />
    <meta property="og:title" content="Reglado Group | Portal Empresarial" />
    <meta property="og:description" content="Portal corporativo de Reglado Group con acceso a servicios de Energía, Inmuebles, Consultoría y Tecnología." />
    <meta property="og:image" content="https://regladogroup.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Reglado Group - Portal Empresarial" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://regladogroup.com/" />
    <meta name="twitter:title" content="Reglado Group | Portal Empresarial" />
    <meta name="twitter:description" content="Portal corporativo de Reglado Group con acceso a servicios de Energía, Inmuebles, Consultoría y Tecnología." />
    <meta name="twitter:image" content="https://regladogroup.com/og-image.png" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="shortcut icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="canonical" href="https://regladogroup.com/" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Reglado Group",
      "url": "https://regladogroup.com/",
      "logo": "https://regladogroup.com/logo.png",
      "description": "Portal corporativo de Reglado Group con acceso a servicios de Energía, Inmuebles, Consultoría y Tecnología.",
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+34 911462674",
        "contactType": "customer service",
        "email": "info@regladoconsultores.com",
        "areaServed": "ES",
        "availableLanguage": ["Spanish"]
      },
      "sameAs": [
        "https://www.linkedin.com/in/reglado-abogados-y-consultores-90b7a0233/"
      ]
    }
    </script>

    <!-- Google Search Console Verification (Añadir etiqueta meta aquí si se solicita) -->
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>

    <!-- Chatbot Reglado -->
    <script>
      window.ChatbotRegladoConfig = {
        apiUrl: "https://chatbot.regladogroup.com/chat",
        title: "Asistente Reglado Group",
        greeting: "¡Hola! Soy el asistente de Reglado Group. ¿En qué puedo ayudarte?",
        primaryColor: "#273d5c", // Azul corporativo Group
        placeholder: "Escribe tu duda aquí...",
        sendButtonLabel: "Enviar",
      };
    </script>
    <style>
      /* Chatbot Design for Reglado Group */
      .cr-chat-window {
        border: 1px solid rgba(39, 61, 92, 0.2) !important;
        background: radial-gradient(circle at 10% 10%, rgba(39, 61, 92, 0.04), transparent 50%),
                    radial-gradient(circle at 90% 0%, rgba(220, 194, 143, 0.05), transparent 50%),
                    #ffffff !important;
        backdrop-filter: blur(15px) !important;
        border-radius: 18px !important;
        box-shadow: 0 20px 50px rgba(16, 28, 47, 0.15) !important;
      }
      body.dark-mode .cr-chat-window {
        background: #1e293b !important;
        border-color: rgba(255, 255, 255, 0.1) !important;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4) !important;
      }
      .cr-chat-header {
        background: linear-gradient(135deg, #273d5c, #1a2b43) !important;
        color: #ffffff !important;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
        border-radius: 17px 17px 0 0 !important;
      }
      .cr-chat-messages {
        background: transparent !important;
      }
      .cr-chat-bubble {
        font-family: "Outfit", sans-serif !important;
        border-radius: 12px !important;
      }
      .cr-chat-row.bot .cr-chat-bubble {
        background: #f1f5f9 !important;
        color: #1e293b !important;
        border: 1px solid #e2e8f0 !important;
      }
      body.dark-mode .cr-chat-row.bot .cr-chat-bubble {
        background: rgba(255, 255, 255, 0.05) !important;
        color: #f1f5f9 !important;
        border-color: rgba(255, 255, 255, 0.1) !important;
      }
      .cr-chat-footer {
        background: transparent !important;
        border-top: 1px solid rgba(0, 0, 0, 0.05) !important;
      }
      body.dark-mode .cr-chat-footer {
        border-top-color: rgba(255, 255, 255, 0.08) !important;
      }
      .cr-chat-input-wrapper {
        background: #ffffff !important;
        border: 1px solid #d1d5db !important;
        border-radius: 12px !important;
      }
      body.dark-mode .cr-chat-input-wrapper {
        background: rgba(0, 0, 0, 0.2) !important;
        border-color: rgba(255, 255, 255, 0.1) !important;
      }
      .cr-chat-input-wrapper:focus-within {
        border-color: #273d5c !important;
        box-shadow: 0 0 0 3px rgba(39, 61, 92, 0.1) !important;
      }
      body.dark-mode .cr-chat-input-wrapper:focus-within {
        border-color: #60a5fa !important;
        box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.15) !important;
      }
      body.dark-mode .cr-chat-input {
        color: #ffffff !important;
      }
      .cr-chat-input {
        scrollbar-width: none !important; /* Firefox */
      }
      .cr-chat-input::-webkit-scrollbar {
        display: none !important; /* Chrome/Safari/Edge */
      }
      .cr-chat-messages {
        scrollbar-width: thin !important;
        scrollbar-color: rgba(39, 61, 92, 0.3) transparent !important;
      }
      .cr-chat-messages::-webkit-scrollbar {
        width: 6px !important;
      }
      .cr-chat-messages::-webkit-scrollbar-track {
        background: transparent !important;
      }
      .cr-chat-messages::-webkit-scrollbar-thumb {
        background: rgba(39, 61, 92, 0.3) !important;
        border-radius: 999px !important;
      }
      .cr-chat-messages::-webkit-scrollbar-thumb:hover {
        background: rgba(39, 61, 92, 0.55) !important;
      }
      body.dark-mode .cr-chat-messages {
        scrollbar-color: rgba(96, 165, 250, 0.4) transparent !important;
      }
      body.dark-mode .cr-chat-messages::-webkit-scrollbar-thumb {
        background: rgba(96, 165, 250, 0.4) !important;
      }
      body.dark-mode .cr-chat-messages::-webkit-scrollbar-thumb:hover {
        background: rgba(96, 165, 250, 0.65) !important;
      }
      .cr-chat-submit {
        background: #273d5c !important;
        border-radius: 10px !important;
        border: none !important;
        transition: all 0.2s ease !important;
      }
      .cr-chat-submit:hover:not(:disabled) {
        background: #1a2b43 !important;
        transform: translateY(-1px) !important;
      }
      .cr-chat-typing span {
        background: #273d5c !important;
      }
    </style>
    <script src="https://chatbot.regladogroup.com/widget/chatbotReglado.js"></script>
  </body>
</html>
