<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!--
      Content Security Policy — hardening F1 (2026-04-27).
      Maps carga librerías externas (jQuery, Leaflet, Bootstrap, Select2,
      SweetAlert2, FontAwesome) desde CDN públicos en `apimapa/`. La
      política los lista explícitamente. Si tras un cambio de dependencias
      aparece "Refused to load..." en consola, añadir el origen legítimo.
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://code.jquery.com https://unpkg.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com;
      font-src 'self' data: https://fonts.gstatic.com https://cdnjs.cloudflare.com;
      img-src 'self' data: blob: https:;
      connect-src 'self' http://localhost http://localhost:8000 https://regladogroup.com https://www.regladogroup.com https://regladomaps.com https://www.regladomaps.com https://regladoconsultores.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://code.jquery.com https://unpkg.com;
      media-src 'self' blob:;
      base-uri 'self';
      form-action 'self';
      object-src 'none';
    " />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Reglado Maps | Mapa energético de España</title>
    <meta
      name="description"
      content="Reglado Maps - Plataforma interactiva para la gestión y visualización de recursos energéticos, propiedades y ubicaciones de Grupo Reglado."
    />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Reglado Maps" />
    <meta
      name="keywords"
      content="mapa energético España, plantas eólicas, plantas solares, energía hidráulica, biodiésel, biometano, hidrógeno, recursos energéticos, visor de mapa, Reglado Group"
    />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Reglado Maps" />
    <meta property="og:title" content="Reglado Maps | Mapa energético de España" />
    <meta
      property="og:description"
      content="Visualiza el mapa energético de España: plantas eólicas, solares, hidráulicas, biodiésel, biometano e hidrógeno sobre un visor interactivo."
    />
    <meta property="og:url" content="https://regladomaps.com/" />
    <meta property="og:image" content="https://regladomaps.com/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Reglado Maps | Mapa energético de España" />
    <meta
      name="twitter:description"
      content="Visualiza el mapa energético de España: plantas eólicas, solares, hidráulicas, biodiésel, biometano e hidrógeno sobre un visor interactivo."
    />
    <meta name="twitter:image" content="https://regladomaps.com/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="shortcut icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="/reglado-logo.svg" />

    <!-- Canonical (se actualiza dinámicamente en la SPA) -->
    <link rel="canonical" href="https://regladomaps.com/" />

    <!-- Fuente corporativa Outfit (Google Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <script type="application/ld+json">
